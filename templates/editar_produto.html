{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4 shadow-sm border-0">
            <div class="d-flex align-items-center mb-4">
                <span class="fs-4 me-2">📦</span>
                <h4 class="mb-0 text-danger">Editar Produto</h4>
            </div>

            <form action="/editar_produto/{{ produto.id }}" method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold small">Nome do Produto</label>
                    <input type="text" name="nome" class="form-control" maxlength="40" value="{{ produto.nome }}"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold small">Estoque Mínimo (Alerta)</label>
                    <div class="input-group">
                        <input type="number" step="0.01" min="0" max="999" name="estoque_minimo" class="form-control"
                            value="{{ produto.estoque_minimo }}">
                        <span class="input-group-text">{{ produto.unidade }}</span>
                    </div>
                    <div class="form-text">Você será avisado quando o estoque atingir este valor.</div>
                </div>
                <div class="row mt-4 border-top pt-3">
                    <div class="col-md-6 mb-3">
                        <div class="form-check form-switch mt-4">
                            <input class="form-check-input" type="checkbox" id="vender_direto" name="vender_direto" {%
                                if produto.vender_direto %}checked{% endif %}>
                            <label class="form-check-label fw-bold text-success small" for="vender_direto">Ativar Venda
                                Direta?</label>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label text-success fw-bold small">Preço de Venda (R$)</label>
                        <input type="number" step="0.01" min="0" name="preco_venda" class="form-control border-success"
                            value="{{ produto.preco_venda }}">
                    </div>
                </div>
                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-success flex-grow-1 fw-bold">Salvar Alterações</button>
                    <a href="/produtos" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
