{% extends 'base.html' %}

{% block content %}
<div class="container mt-4 d-flex justify-content-center">
    <div class="card shadow-sm border-0" style="max-width: 600px; width: 100%;">
        <div class="card-header bg-warning text-dark fw-bold text-center py-3">
            <h4 class="mb-0">✏️ Editar Entregador</h4>
        </div>
        
        <div class="card-body p-4">
            <form action="{{ url_for('editar_entregador', id=entregador.id) }}" method="POST">
                
                <div class="mb-3">
                    <label class="form-label text-muted fw-bold small">Nome Completo</label>
                    <input type="text" name="nome" class="form-control form-control-lg" maxlength="80" value="{{ entregador.nome }}" required>
                </div>
                
                <div class="mb-3">
                    <label class="form-label text-muted fw-bold small">WhatsApp / Telefone</label>
                    <input type="text" name="telefone" class="form-control" oninput="this.value = this.value.replace(/[^0-9]/g, '')" maxlength="11" value="{{ entregador.telefone }}" required>
                </div>
                
                <div class="row">
                    <div class="col-md-7 mb-3">
                        <label class="form-label text-muted fw-bold small">Veículo</label>
                        <input type="text" name="veiculo" class="form-control" maxlength="30" value="{{ entregador.veiculo }}">
                    </div>
                    
                    <div class="col-md-5 mb-4">
                        <label class="form-label text-danger fw-bold small">Placa</label>
                        <input type="text" name="placa" class="form-control font-monospace text-uppercase border-danger" 
                               maxlength="7" minlength="7" value="{{ entregador.placa }}" required>
                    </div>
                </div>
                
                <div class="d-flex justify-content-between mt-2">
                    <a href="{{ url_for('gerenciar_entregadores') }}" class="btn btn-outline-secondary px-4 fw-bold">Cancelar</a>
                    <button type="submit" class="btn btn-success px-5 fw-bold">💾 Salvar Alterações</button>
                </div>
                
            </form>
        </div>
    </div>
</div>
{% endblock %}
