{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>➕ Cadastrar Novo Produto</h2>
            <a href="/produtos" class="btn btn-outline-secondary">⬅️ Voltar</a>
        </div>

        <div class="card p-4 shadow-sm border-0">
            <form action="/cadastrar_produto" method="POST">
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Nome do Produto/Insumo</label>
                    <input type="text" name="nome" class="form-control"
                        placeholder="Ex: Farinha de Trigo ou Coca-Cola 2L" required autofocus>
                </div>
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Unidade de Medida</label>
                        <select name="unidade" class="form-select" required>
                            <option value="KG">Quilograma (KG)</option>
                            <option value="L">Litro (L)</option>
                            <option value="UN">Unidade (UN)</option>
                            <option value="CX">Caixa (CX)</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Estoque Mínimo (Alerta)</label>
                        <input type="number" step="0.01" min="0" name="estoque_minimo" class="form-control" value="0">
                    </div>
                </div>

                <div class="p-3 bg-light rounded mt-3 mb-4 border">
                    <h6 class="fw-bold mb-3"><i class="fas fa-store text-success"></i> Configurações de Venda</h6>
                    <div class="row">
                        <div class="col-md-6 mb-3 mb-md-0">
                            <div class="form-check form-switch mt-2">
                                <input class="form-check-input" type="checkbox" id="vender_direto" name="vender_direto">
                                <label class="form-check-label fw-bold text-success" for="vender_direto">Permitir Venda Direta?</label>
                            </div>
                            <small class="text-muted d-block mt-1">Marque se este item for vendido avulso no PDV (ex: Refrigerante).</small>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold text-success">Preço de Venda (R$)</label>
                            <input type="number" step="0.01" min="0" name="preco_venda" class="form-control border-success" placeholder="0.00">
                        </div>
                    </div>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg fw-bold">Salvar Produto</button>
                </div>

            </form>
        </div>

    </div>
</div>
{% endblock %}
