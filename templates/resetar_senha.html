{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card p-4 shadow-sm border-0 border-top border-4 border-success">
            <div class="text-center mb-4">
                <span class="fs-1">🔐</span> 
                <h4 class="mt-2 text-success fw-bold">Criar Nova Senha</h4>
                <p class="text-muted small">Digite sua nova senha abaixo para acessar o sistema PizzaStock.</p>
            </div>

            <form action="/resetar_senha/{{ token }}" method="POST">
                <div class="mb-4">
                    <label for="nova_senha" class="form-label fw-bold small">Nova Senha</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light bg-opacity-50"><i class="bi bi-key text-secondary"></i></span>
                        <input type="password" class="form-control" id="nova_senha" name="nova_senha" minlength="4" placeholder="Digite a nova senha" required>
                    </div>
                </div>

                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-success fw-bold py-2">
                        💾 Salvar e Acessar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
