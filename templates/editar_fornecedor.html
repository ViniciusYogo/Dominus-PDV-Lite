{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4 shadow-sm border-0">
            <h4 class="mb-4 text-danger">🤝 Editar Fornecedor</h4>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold small">Nome do Fornecedor</label>
                    <input type="text" name="nome" class="form-control" maxlength="120" value="{{ fornecedor.nome }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold small">Contato</label>
                    <input type="text" name="contato" class="form-control" value="{{ fornecedor.contato }}"
                        oninput="this.value = this.value.replace(/[^0-9]/g, '')" maxlength="11">
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success flex-grow-1">Salvar Alterações</button>
                    <a href="/fornecedores" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
